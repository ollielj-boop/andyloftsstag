<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Andy's Putting Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a200a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100svh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        /* ── Shell: fixed Game Boy aspect ratio with pillarboxing ── */
        #shell {
            position: relative;
            /* Fixed internal resolution — CSS scales it to fit */
            width: 360px;
            height: 640px;
            background: #0f380f;
            border: 3px solid #306230;
            box-shadow: 0 0 0 3px #0a200a, 0 0 0 6px #8bac0f,
                        0 0 40px rgba(139,172,15,0.25);
            overflow: hidden;
            /* Scale down to fit any screen while preserving aspect ratio */
            transform-origin: center center;
        }

        .screen { position: absolute; inset: 0; display: none; }
        .screen.active { display: block; }

        #homeScreen img {
            width: 100%; height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }
        #playBtn {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #0f380f; color: #9bbc0f; border: 3px solid #9bbc0f;
            font-family: 'Press Start 2P', monospace; font-size: 16px;
            padding: 12px 36px; cursor: pointer; letter-spacing: 4px;
            box-shadow: 3px 3px 0 #306230; animation: blink 0.8s step-end infinite; z-index: 10;
            white-space: nowrap;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        #playBtn:hover { animation: none; background: #306230; }

        #gameCanvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        #puttBtn {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            background: #0f380f; color: #9bbc0f; border: 3px solid #9bbc0f;
            font-family: 'Press Start 2P', monospace; font-size: 13px;
            padding: 9px 24px; cursor: pointer; letter-spacing: 2px;
            box-shadow: 3px 3px 0 #306230, 0 0 10px rgba(155,188,15,0.5);
            z-index: 10; display: none;
            user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; white-space: nowrap;
        }
        #puttBtn:active { transform: translateX(-50%) translate(2px,2px); box-shadow: 1px 1px 0 #306230; }

        /* scanlines */
        #shell::after {
            content:''; position:absolute; inset:0; pointer-events:none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px,
                rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
            z-index: 100;
        }
    </style>
</head>
<body>
<div id="shell">
    <div id="homeScreen" class="screen active">
        <img src="images/putting.jpeg" alt="Andy's Putting Challenge">
        <button id="playBtn" onclick="startGame()">▶ PLAY</button>
    </div>
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas"></canvas>
        <button id="puttBtn">PUTT!</button>
    </div>
</div>

<script>
// ── Fixed canvas dimensions (shell is always 360×640)
const CW = 360;
const CH = 640;

// ── Scale shell to fit viewport with pillarboxing
function scaleShell() {
    const shell = document.getElementById('shell');
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / CW, vh / CH);
    shell.style.transform = `scale(${scale})`;
    shell.style.left  = Math.round((vw - CW * scale) / 2) + 'px';
    shell.style.top   = Math.round((vh - CH * scale) / 2) + 'px';
    shell.style.position = 'fixed';
}
scaleShell();
window.addEventListener('resize', scaleShell);

// ── Palette
const GB = {
    darkest: '#0f380f', dark: '#306230',
    mid: '#8bac0f',     light: '#9bbc0f',
    lightest: '#c4d89a'
};

// ── Level data
// Final hole (index 4) is bigger now: 30px instead of 22px
const LEVEL_HOLES = [80, 62, 46, 34, 30];
const BALL_R       = 7;
const SHELF_H      = 18;
const HUD_H        = 28;
const BTN_H        = 50;
const GAME_H       = CH - HUD_H - BTN_H;  // 562px
const ARROW_SPEED_BASE = 3.0;
const PUTT_SPEED   = 5.5;

let canvas, ctx;

// ── State
let level       = 0;
let state       = 'idle';  // idle|rolling|falling|miss|gameover|win
let arrowX      = 0;
let arrowDir    = 1;
let arrowSpeed  = ARROW_SPEED_BASE;
let ballX       = 0;
let ballY       = 0;
let ballVX      = 0;
let ballVY      = 0;
let swingTimer  = 0;
let putterSwing = 0;
let flashTimer  = 0;
let totalHoles  = 5;
let extraMode   = false;

// Button hit-areas (set in drawOverlays, used in tap handler)
let btnRects = {};

let shelves = [];

// ── Init
function startGame() {
    document.getElementById('homeScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');

    canvas = document.getElementById('gameCanvas');
    canvas.width  = CW;
    canvas.height = CH;
    ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    document.getElementById('puttBtn').style.display = 'block';

    buildLayout(false);
    initLevel(0, false);

    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); onPutt(); }
    });
    document.getElementById('puttBtn').addEventListener('click', handlePuttBtn);
    document.getElementById('puttBtn').addEventListener('touchend', e => { e.preventDefault(); handlePuttBtn(); });
    canvas.addEventListener('click',    e => handleCanvasTap(tapCoords(e, 'click')));
    canvas.addEventListener('touchend', e => { e.preventDefault(); handleCanvasTap(tapCoords(e, 'touch')); });

    requestAnimationFrame(loop);
}

function tapCoords(e, type) {
    const rect = canvas.getBoundingClientRect();
    // canvas is always CW×CH but CSS may scale it — use actual rendered size
    const scaleX = CW / rect.width;
    const scaleY = CH / rect.height;
    const src = type === 'touch' ? e.changedTouches[0] : e;
    return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY
    };
}

function inRect(p, r) {
    return p && r && p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
}

// ── PUTT button (HTML element): handles both game putt + overlays
function handlePuttBtn() {
    if (state === 'win') {
        doKeepPlaying();
    } else if (state === 'gameover') {
        doRetry();
    } else {
        onPutt();
    }
}

// ── Canvas tap: handles overlay buttons + HUD home link
function handleCanvasTap(p) {
    // HUD home tap (left half of top bar)
    if (p.y <= HUD_H && p.x < CW / 2) {
        window.location.href = 'index.html';
        return;
    }
    if (state === 'gameover') {
        if (inRect(p, btnRects.retry))  { doRetry(); return; }
        if (inRect(p, btnRects.goHome)) { window.location.href = 'index.html'; return; }
    }
    if (state === 'win') {
        if (inRect(p, btnRects.keepPlaying)) { doKeepPlaying(); return; }
        if (inRect(p, btnRects.goHome))      { window.location.href = 'index.html'; return; }
    }
}

function doRetry() {
    buildLayout(false);
    initLevel(0, false);
}

function doKeepPlaying() {
    extraMode  = true;
    totalHoles = totalHoles; // keep current count
    buildLayout(true);
    initLevel(0, true);
}

// ── Layout
function buildLayout(extra) {
    shelves = [];
    const slotH = GAME_H / 5;
    for (let i = 0; i < 5; i++) {
        const shelfY = Math.round(HUD_H + slotH * (i + 1) - SHELF_H);
        const hw = extra ? LEVEL_HOLES[4] : LEVEL_HOLES[i];
        // Putter side alternates; in extra mode continue alternating from previous set
        const parity = extra ? (i % 2 === 0 ? 'right' : 'left') : (i % 2 === 0 ? 'left' : 'right');
        const side = parity;
        let holeLeft;
        if (extra) {
            // Random, 20–80% width, never within 15% of each wall
            const minX = Math.round(CW * 0.20);
            const maxX = Math.round(CW * 0.80) - hw;
            holeLeft = minX + Math.floor(Math.random() * Math.max(1, maxX - minX));
        } else if (i === 4) {
            // Level 5: 70% along from putter side
            holeLeft = side === 'left'
                ? Math.round(CW * 0.70) - hw
                : Math.round(CW * 0.30);
        } else {
            holeLeft = side === 'left' ? CW - hw - 26 : 26;
        }
        shelves.push({ y: shelfY, holeLeft, holeRight: holeLeft + hw, side });
    }
}

// ── Level init
function initArrow(lv) {
    const s = shelves[lv];
    arrowX    = ballX;
    arrowDir  = s.side === 'left' ? 1 : -1;
    arrowSpeed = ARROW_SPEED_BASE + (extraMode ? 4 : lv) * 0.9;
}

function initLevel(lv, keepTotal) {
    level       = lv;
    state       = 'idle';
    putterSwing = 0;
    swingTimer  = 0;
    flashTimer  = 0;
    ballVX = 0;
    ballVY = 0;
    if (!keepTotal) { totalHoles = 5; extraMode = false; }
    const s = shelves[lv];
    ballX = s.side === 'left' ? 40 : CW - 40;
    ballY = s.y - BALL_R;
    initArrow(lv);
}

// ── Putt
function onPutt() {
    if (state !== 'idle') return;
    const s = shelves[level];
    const inHole = arrowX >= s.holeLeft && arrowX <= s.holeRight;
    putterSwing = 1;
    swingTimer  = 0;
    state = 'rolling';
    if (inHole) {
        ballVX = s.side === 'left' ? PUTT_SPEED : -PUTT_SPEED;
    } else {
        ballVX = s.side === 'left' ? PUTT_SPEED * 0.5 : -PUTT_SPEED * 0.5;
        state = 'miss';
        flashTimer = 80;
    }
}

// ── Update
function update() {
    swingTimer++;

    if (state === 'idle') {
        const s   = shelves[level];
        const min = s.side === 'left' ? ballX : 4;
        const max = s.side === 'left' ? CW - 4 : ballX;
        arrowX += arrowDir * arrowSpeed;
        if (arrowX >= max) { arrowX = max; arrowDir = -1; }
        if (arrowX <= min) { arrowX = min; arrowDir =  1; }
    }

    if (state === 'rolling') {
        ballX += ballVX;
        const s = shelves[level];
        if (ballX > s.holeLeft + BALL_R && ballX < s.holeRight - BALL_R) {
            state = 'falling';
            ballVY = 2;
            ballVX *= 0.2;
        }
        if (ballX < BALL_R || ballX > CW - BALL_R) {
            state = 'miss';
            flashTimer = 80;
            ballVX = 0;
        }
    }

    if (state === 'miss') {
        ballX += ballVX;
        ballVX *= 0.88;
        if (flashTimer > 0) flashTimer--;
        if (flashTimer === 0) state = 'gameover';
    }

    if (state === 'falling') {
        ballVY += 0.4;
        ballY  += ballVY;
        ballX  += ballVX;
        if (level < 4) {
            const nextShelf = shelves[level + 1];
            if (ballY >= nextShelf.y - BALL_R) {
                ballY  = nextShelf.y - BALL_R;
                ballVX = 0;
                ballVY = 0;
                totalHoles++;
                level++;
                const ns = shelves[level];
                ballX = ns.side === 'left' ? 40 : CW - 40;
                ballY = ns.y - BALL_R;
                initLevel(level, true);
            }
        } else {
            if (ballY > CH) {
                totalHoles++;
                if (extraMode) {
                    buildLayout(true);
                    initLevel(0, true);
                } else {
                    state = 'win';
                }
            }
        }
    }
}

// ── Loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ── Draw
function draw() {
    ctx.fillStyle = GB.lightest;
    ctx.fillRect(0, 0, CW, CH);
    drawShelves();
    drawBall();
    drawArrow();
    drawPutter();
    drawHUD();
    drawOverlays();
}

function drawShelves() {
    for (let i = 0; i < 5; i++) {
        const s  = shelves[i];
        const hl = s.holeLeft;
        const hr = s.holeRight;
        const hw = hr - hl;

        // Left shelf block
        ctx.fillStyle = GB.darkest;
        ctx.fillRect(0, s.y, hl, SHELF_H);
        // Right shelf block
        ctx.fillRect(hr, s.y, CW - hr, SHELF_H);

        // Top highlight on solid parts
        ctx.fillStyle = GB.dark;
        ctx.fillRect(0, s.y, hl, 2);
        ctx.fillRect(hr, s.y, CW - hr, 2);

        // Hole: same as background colour
        ctx.fillStyle = GB.lightest;
        ctx.fillRect(hl, s.y, hw, SHELF_H);

        // Hole edge walls (bright lines)
        ctx.fillStyle = GB.mid;
        ctx.fillRect(hl - 2, s.y, 2, SHELF_H);
        ctx.fillRect(hr,     s.y, 2, SHELF_H);

        // Hole top lip (dark line)
        ctx.fillStyle = GB.dark;
        ctx.fillRect(hl, s.y, hw, 2);

        // ── Flag behind hole on far side from putter ──
        const poleX = s.side === 'left' ? hr + 10 : hl - 10;
        const poleTop = s.y - 20;
        ctx.fillStyle = GB.darkest;
        ctx.fillRect(poleX - 1, poleTop, 2, 20);
        ctx.fillStyle = GB.dark;
        ctx.beginPath();
        if (s.side === 'left') {
            ctx.moveTo(poleX, poleTop);
            ctx.lineTo(poleX - 11, poleTop + 5);
            ctx.lineTo(poleX, poleTop + 10);
        } else {
            ctx.moveTo(poleX, poleTop);
            ctx.lineTo(poleX + 11, poleTop + 5);
            ctx.lineTo(poleX, poleTop + 10);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = GB.darkest; ctx.lineWidth = 1; ctx.stroke();
    }
}

function drawBall() {
    if (state === 'win') return;
    const x = Math.round(ballX), y = Math.round(ballY);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x + 2, y + BALL_R, BALL_R, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = GB.lightest;
    ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = GB.darkest; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = GB.mid; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, BALL_R - 2, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(x - 3, y - 5, 3, 2);
}

function drawArrow() {
    if (state !== 'idle') return;
    const s  = shelves[level];
    const ay = s.y - 14;
    const ax = Math.round(arrowX);
    const aw = 10, ah = 12;
    // Downward-pointing triangle
    ctx.fillStyle = GB.darkest;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - aw, ay - ah);
    ctx.lineTo(ax + aw, ay - ah);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = GB.mid; ctx.lineWidth = 1; ctx.stroke();
    // Hole zone highlight
    ctx.fillStyle = 'rgba(139,172,15,0.18)';
    ctx.fillRect(s.holeLeft, s.y - 20, s.holeRight - s.holeLeft, 20);
}

function drawPutter() {
    if (state === 'win' || state === 'gameover') return;
    const s     = shelves[level];
    const swing = putterSwing === 1 && swingTimer < 25;
    const baseX = s.side === 'left' ? 20 : CW - 20;
    ctx.save();
    ctx.translate(baseX, s.y);
    if (s.side === 'right') ctx.scale(-1, 1);
    drawAndyPutter(swing);
    ctx.restore();
}

function drawAndyPutter(swing) {
    const D  = GB.darkest;
    const M  = GB.mid;
    const L  = GB.lightest;
    const W2 = '#e8f4c0';

    // Shoes
    ctx.fillStyle = D;
    ctx.fillRect(-8,-5,7,5); ctx.fillRect(1,-5,8,5);
    ctx.fillStyle = M;
    ctx.fillRect(-8,-5,7,1); ctx.fillRect(1,-5,8,1);

    // Trousers
    ctx.fillStyle = D;
    ctx.fillRect(-7,-20,6,16); ctx.fillRect(1,-20,6,16);
    ctx.fillRect(-7,-22,14,4);
    ctx.fillStyle = M; ctx.fillRect(-5,-18,2,10);

    // Belt
    ctx.fillStyle = '#0a2a0a'; ctx.fillRect(-8,-23,16,3);
    ctx.fillStyle = M; ctx.fillRect(-1,-23,3,3);

    // Shirt
    ctx.fillStyle = M; ctx.fillRect(-8,-38,16,16);
    ctx.fillStyle = L; ctx.fillRect(-2,-38,4,5);
    ctx.fillStyle = D; ctx.fillRect(-1,-37,2,4);
    ctx.fillStyle = D; ctx.fillRect(-7,-35,5,4);
    ctx.fillStyle = M; ctx.fillRect(-6,-34,3,2);
    ctx.fillStyle = L; ctx.fillRect(-4,-40,8,4);

    // Arms + club
    if (!swing) {
        ctx.fillStyle = M; ctx.fillRect(-11,-36,5,18);
        ctx.fillStyle = L; ctx.fillRect(-11,-26,5,8); ctx.fillRect(-11,-19,5,5);
        ctx.fillStyle = GB.dark; ctx.fillRect(6,-36,5,14);
        ctx.fillStyle = D; ctx.fillRect(6,-24,5,6);
        ctx.fillStyle = L; ctx.fillRect(-9,-19,3,3);
        ctx.fillStyle = D; ctx.fillRect(-9,0,3,-18);
        ctx.fillStyle = GB.mid; ctx.fillRect(-14,-4,10,4);
        ctx.fillStyle = D; ctx.fillRect(-14,-4,10,1);
    } else {
        ctx.fillStyle = M; ctx.fillRect(3,-40,5,14);
        ctx.fillStyle = L; ctx.fillRect(6,-34,5,10); ctx.fillRect(8,-26,4,6);
        ctx.fillStyle = M; ctx.fillRect(-2,-38,5,12);
        ctx.fillStyle = L; ctx.fillRect(0,-30,5,8); ctx.fillRect(2,-24,4,5);
        ctx.fillStyle = D; ctx.fillRect(8,-24,2,20);
        ctx.fillStyle = GB.mid; ctx.fillRect(8,-8,10,4);
        ctx.fillStyle = D; ctx.fillRect(8,-8,10,1);
    }

    // Neck
    ctx.fillStyle = L; ctx.fillRect(-3,-44,6,5);

    // Head
    ctx.fillStyle = L; ctx.fillRect(-9,-58,18,16);
    ctx.fillRect(-11,-55,3,8); ctx.fillRect(8,-55,3,8);
    ctx.fillStyle = D; ctx.fillRect(-10,-54,1,5); ctx.fillRect(9,-54,1,5);

    // Hair
    ctx.fillStyle = D;
    ctx.fillRect(-9,-58,18,5); ctx.fillRect(-9,-58,3,12); ctx.fillRect(6,-58,3,8);
    ctx.fillStyle = GB.dark; ctx.fillRect(-5,-57,6,2);

    // Cap
    ctx.fillStyle = D;
    ctx.fillRect(-9,-60,18,4); ctx.fillRect(-9,-60,20,2);
    ctx.fillRect(-7,-65,14,7); ctx.fillRect(-5,-68,10,5);
    ctx.fillRect(7,-60,6,3);
    ctx.fillStyle = GB.dark; ctx.fillRect(-6,-65,5,2);

    // Eyebrows
    ctx.fillStyle = D; ctx.fillRect(-6,-51,5,2); ctx.fillRect(1,-51,5,2);

    // Eyes (small)
    ctx.fillStyle = W2; ctx.fillRect(-5,-48,3,3); ctx.fillRect(2,-48,3,3);
    ctx.fillStyle = D;  ctx.fillRect(-4,-47,2,2); ctx.fillRect(3,-47,2,2);
    ctx.fillStyle = W2; ctx.fillRect(-4,-47,1,1); ctx.fillRect(3,-47,1,1);

    // Nose
    ctx.fillStyle = GB.dark; ctx.fillRect(-1,-44,2,3);

    // Mouth
    ctx.fillStyle = D;
    ctx.fillRect(-4,-41,8,2); ctx.fillRect(-5,-42,2,1); ctx.fillRect(3,-42,2,1);
    ctx.fillStyle = GB.dark; ctx.fillRect(-7,-43,14,1);
}

function drawHUD() {
    ctx.fillStyle = GB.darkest;
    ctx.fillRect(0, 0, CW, HUD_H);

    // Left: ANDY LOFTS STAG DO (home link)
    ctx.fillStyle = GB.light;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('ANDY LOFTS', 6, 10);
    ctx.fillText('STAG DO', 6, 20);

    // Right: holes counter
    ctx.fillStyle = GB.mid;
    ctx.font = '7px "Press Start 2P"';
    ctx.textAlign = 'right';
    ctx.fillText('HOLES: ' + totalHoles, CW - 6, 17);
}

// ── Overlay helpers
function makeBtn(label, cx, y, w, h, blink) {
    const on = !blink || Math.floor(Date.now() / 500) % 2;
    const x = cx - w / 2;
    ctx.fillStyle = on ? GB.dark : GB.darkest;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = on ? GB.light : GB.mid;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = on ? GB.lightest : GB.mid;
    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, y + h / 2 + 4);
    return { x, y, w, h };
}

function drawOverlays() {
    btnRects = {};

    if (state === 'miss' && flashTimer > 0) {
        const flash = Math.floor(flashTimer / 6) % 2 === 0;
        if (flash) {
            ctx.fillStyle = 'rgba(15,56,15,0.45)';
            ctx.fillRect(0, HUD_H, CW, GAME_H);
        }
        ctx.font = '14px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillStyle = flash ? GB.lightest : GB.mid;
        ctx.fillText('MISS!', CW / 2, CH / 2 - 30);
    }

    if (state === 'gameover') {
        ctx.fillStyle = 'rgba(5,15,5,0.88)';
        ctx.fillRect(0, 0, CW, CH);
        ctx.textAlign = 'center';
        ctx.fillStyle = GB.lightest;
        ctx.font = '18px "Press Start 2P"';
        ctx.fillText('MISS!', CW / 2, CH / 2 - 90);
        ctx.font = '7px "Press Start 2P"';
        ctx.fillStyle = GB.mid;
        ctx.fillText('YOU FAILED TO GET', CW / 2, CH / 2 - 62);
        ctx.fillText('A HOLE IN ONE!',    CW / 2, CH / 2 - 48);
        btnRects.retry  = makeBtn('TRY AGAIN', CW/2, CH/2 - 28, 170, 32, true);
        btnRects.goHome = makeBtn('GO HOME',   CW/2, CH/2 + 16, 170, 32, false);
    }

    if (state === 'win') {
        ctx.fillStyle = 'rgba(5,15,5,0.88)';
        ctx.fillRect(0, 0, CW, CH);
        ctx.textAlign = 'center';
        ctx.fillStyle = GB.light;
        ctx.font = '18px "Press Start 2P"';
        ctx.fillText('YOU WIN!', CW / 2, CH / 2 - 100);
        ctx.font = '7px "Press Start 2P"';
        ctx.fillStyle = GB.mid;
        ctx.fillText('ALL 5 HOLES DONE!',       CW / 2, CH / 2 - 74);
        ctx.fillText('HOLES COMPLETED: ' + totalHoles, CW / 2, CH / 2 - 58);
        btnRects.keepPlaying = makeBtn('KEEP PLAYING', CW/2, CH/2 - 38, 180, 32, true);
        btnRects.goHome      = makeBtn('GO HOME',      CW/2, CH/2 +  8, 180, 32, false);
    }
}
</script>
