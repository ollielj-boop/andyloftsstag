<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Game - Andy's Stag Do</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #87CEEB 0%, #90EE90 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            color: #2d5016;
            margin-bottom: 20px;
        }

        .golf-emoji {
            font-size: 80px;
            margin: 20px 0;
        }

        p {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-button {
            background-color: #2d5016;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background-color: #3d6026;
            transform: scale(1.05);
        }

        .coming-soon {
            font-style: italic;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛳ GOLF GAME ⛳</h1>
        <div class="golf-emoji">🏌️</div>
        <p><strong>Coming Soon!</strong></p>
        <p>The golf game is under construction. Check back later to tee off!</p>
        <a href="adventure.html" class="back-button">← Back to Adventure</a>
        <p class="coming-soon">This page is a placeholder for now</p>
    </div>
</body>
</html>
