<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Andy's Putting Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f380f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        #shell {
            position: relative;
            width: min(400px, 100vw);
            height: min(680px, 100svh);
            background: #0f380f;
            border: 3px solid #306230;
            box-shadow: 0 0 0 3px #0f380f, 0 0 0 6px #8bac0f, 0 0 30px rgba(139,172,15,0.3);
            overflow: hidden;
            image-rendering: pixelated;
        }
        .screen { position: absolute; inset: 0; display: none; }
        .screen.active { display: block; }
        #homeScreen img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
        #playBtn {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #0f380f; color: #9bbc0f; border: 3px solid #9bbc0f;
            font-family: 'Press Start 2P', monospace; font-size: 16px;
            padding: 12px 36px; cursor: pointer; letter-spacing: 4px;
            box-shadow: 3px 3px 0 #306230; animation: blink 0.8s step-end infinite; z-index: 10;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        #playBtn:hover { animation: none; background: #306230; }
        #gameCanvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #puttBtn {
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            background: #0f380f; color: #9bbc0f; border: 3px solid #8bac0f;
            font-family: 'Press Start 2P', monospace; font-size: 13px;
            padding: 10px 28px; cursor: pointer; letter-spacing: 2px;
            box-shadow: 3px 3px 0 #306230; z-index: 10; display: none;
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        #puttBtn:active { transform: translateX(-50%) translate(2px,2px); box-shadow: 1px 1px 0 #306230; }
        #shell::after {
            content:''; position:absolute; inset:0; pointer-events:none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
            z-index:50;
        }
    </style>
</head>
<body>
<div id="shell">
    <div id="homeScreen" class="screen active">
        <img src="images/putting.jpeg" alt="Andy's Putting Challenge">
        <button id="playBtn" onclick="startGame()">▶ PLAY</button>
    </div>
    <div id="gameScreen" class="screen">
        <canvas id="gameCanvas"></canvas>
        <button id="puttBtn">PUTT!</button>
    </div>
</div>
<script>
// ── Palette
const GB = { darkest:'#0f380f', dark:'#306230', mid:'#8bac0f', light:'#9bbc0f', lightest:'#c4d89a', cream:'#e0f0a0' };

// ── Level data: hole widths shrink each level, ball = 8px radius
const LEVEL_HOLES = [80, 62, 46, 32, 22]; // hole widths px
const BALL_R = 7;
const SHELF_H = 18;
const HUD_H   = 24;
const BTN_H   = 52;
const ARROW_SPEED_BASE = 2.2;
const PUTT_SPEED = 5.5; // ball travel speed along level

let canvas, ctx, W, H, GA; // GA = game area height

// ── State
let level       = 0;
let state       = 'idle'; // idle|rolling|falling|gameover|win|miss
let arrowX      = 0;
let arrowDir    = 1;
let arrowSpeed  = ARROW_SPEED_BASE;
let ballX       = 0;
let ballY       = 0;
let ballVX      = 0;
let ballVY      = 0;
let putterSwing = 0;     // 0=ready, 1=swinging
let swingTimer  = 0;
let flashTimer  = 0;
let overlayAlpha= 0;
let resultText  = '';

// Computed layout
let shelves = []; // {y, holeLeft, holeRight, side:'left'|'right'}

function startGame() {
    document.getElementById('homeScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    document.getElementById('puttBtn').style.display = 'block';

    canvas = document.getElementById('gameCanvas');
    const shell = document.getElementById('shell');
    W = shell.clientWidth;
    H = shell.clientHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    GA = H - HUD_H - BTN_H;

    buildLayout();
    initLevel(0);

    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); onPutt(); }
    });
    document.getElementById('puttBtn').addEventListener('click', onPutt);
    document.getElementById('puttBtn').addEventListener('touchend', e => { e.preventDefault(); onPutt(); });
    canvas.addEventListener('click', onCanvasTap);
    canvas.addEventListener('touchend', e => { e.preventDefault(); onCanvasTap(); });

    requestAnimationFrame(loop);
}

function buildLayout() {
    // 5 shelves evenly distributed in the game area
    shelves = [];
    const slotH = GA / 5;
    for (let i = 0; i < 5; i++) {
        const shelfY = Math.round(HUD_H + slotH * (i + 1) - SHELF_H);
        const hw = LEVEL_HOLES[i];
        const side = i % 2 === 0 ? 'left' : 'right'; // putter side
        // Hole is on opposite end from putter
        let holeLeft;
        if (side === 'left') {
            // putter left, hole on RIGHT
            holeLeft = W - hw - 6;
        } else {
            // putter right, hole on LEFT
            holeLeft = 6;
        }
        shelves.push({ y: shelfY, holeLeft, holeRight: holeLeft + hw, side });
    }
}

function initLevel(lv) {
    level = lv;
    state = 'idle';
    putterSwing = 0;
    swingTimer  = 0;
    flashTimer  = 0;

    const s = shelves[lv];
    // Ball starts at putter's feet
    if (s.side === 'left') {
        ballX = 38;
    } else {
        ballX = W - 38;
    }
    ballY  = s.y - BALL_R;
    ballVX = 0;
    ballVY = 0;

    // Arrow starts near ball, sweeps to far wall
    arrowX    = ballX;
    arrowDir  = s.side === 'left' ? 1 : -1;
    arrowSpeed = ARROW_SPEED_BASE + lv * 0.5;
}

function onPutt() {
    if (state === 'gameover' || state === 'win') { resetGame(); return; }
    if (state !== 'idle') return;

    const s = shelves[level];
    const inHole = arrowX >= s.holeLeft && arrowX <= s.holeRight;

    putterSwing = 1;
    swingTimer  = 0;
    state = 'rolling';

    if (inHole) {
        // Ball rolls toward hole
        ballVX = s.side === 'left' ? PUTT_SPEED : -PUTT_SPEED;
    } else {
        // Miss — ball rolls toward wall and stops
        ballVX = s.side === 'left' ? PUTT_SPEED * 0.6 : -PUTT_SPEED * 0.6;
        state  = 'miss';
        flashTimer = 80;
    }
}

function onCanvasTap() {
    if (state === 'gameover' || state === 'win') resetGame();
}

function resetGame() { initLevel(0); }

// ── Main loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    swingTimer++;

    if (state === 'idle') {
        // Sweep arrow
        const s = shelves[level];
        const minX = s.side === 'left' ? ballX : 4;
        const maxX = s.side === 'left' ? W - 4 : ballX;
        arrowX += arrowDir * arrowSpeed;
        if (arrowX >= maxX) { arrowX = maxX; arrowDir = -1; }
        if (arrowX <= minX) { arrowX = minX; arrowDir =  1; }
    }

    if (state === 'rolling') {
        ballX += ballVX;
        const s = shelves[level];
        // Check if ball reaches hole
        const ballCenterOverHole = ballX >= s.holeLeft + BALL_R && ballX <= s.holeRight - BALL_R;
        if (ballCenterOverHole) {
            // Start falling
            state  = 'falling';
            ballVY = 2;
            ballVX *= 0.3; // slow horizontal as it drops in
        }
        // Hit wall — shouldn't happen on good shot but just in case
        if (ballX < BALL_R || ballX > W - BALL_R) {
            state = 'miss';
            flashTimer = 80;
            ballVX = 0;
        }
    }

    if (state === 'miss') {
        ballX += ballVX;
        ballVX *= 0.88;
        flashTimer--;
        if (flashTimer <= 0) {
            state = 'gameover';
        }
    }

    if (state === 'falling') {
        ballX += ballVX;
        ballVY += 0.4; // gravity
        ballY  += ballVY;

        if (level < 4) {
            const nextShelf = shelves[level + 1];
            if (ballY >= nextShelf.y - BALL_R) {
                ballY  = nextShelf.y - BALL_R;
                ballVY = 0;
                ballVX = 0;
                // Move to next level
                level++;
                // Reposition ball at putter for next level
                const ns = shelves[level];
                ballX  = ns.side === 'left' ? 38 : W - 38;
                ballY  = ns.y - BALL_R;
                initLevel(level);
            }
        } else {
            // Level 5 — ball falls off bottom = win
            if (ballY > H) {
                state = 'win';
            }
        }
    }

    if (flashTimer > 0 && state !== 'miss') flashTimer--;
}

// ── Drawing
function draw() {
    // Background
    ctx.fillStyle = GB.lightest;
    ctx.fillRect(0, 0, W, H);

    drawShelves();
    drawBall();
    drawArrow();
    drawPutter();
    drawHUD();
    drawOverlays();
}

function drawShelves() {
    for (let i = 0; i < 5; i++) {
        const s = shelves[i];
        // Left shelf segment
        ctx.fillStyle = GB.darkest;
        ctx.fillRect(0, s.y, s.holeLeft, SHELF_H);
        // Right shelf segment
        ctx.fillRect(s.holeRight, s.y, W - s.holeRight, SHELF_H);

        // Shelf top highlight line
        ctx.fillStyle = GB.dark;
        ctx.fillRect(0, s.y, s.holeLeft, 2);
        ctx.fillRect(s.holeRight, s.y, W - s.holeRight, 2);

        // ── THE HOLE: a dark gap with visible edges ──
        // Dark void inside hole
        ctx.fillStyle = '#050f05';
        ctx.fillRect(s.holeLeft, s.y, s.holeRight - s.holeLeft, SHELF_H);
        // Hole left wall (bright edge)
        ctx.fillStyle = GB.mid;
        ctx.fillRect(s.holeLeft - 2, s.y, 2, SHELF_H);
        // Hole right wall
        ctx.fillStyle = GB.mid;
        ctx.fillRect(s.holeRight, s.y, 2, SHELF_H);
        // Hole top lip shadow
        ctx.fillStyle = '#000';
        ctx.fillRect(s.holeLeft, s.y, s.holeRight - s.holeLeft, 3);

        // Small level number indicator
        ctx.fillStyle = GB.mid;
        ctx.font = '6px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText((i+1).toString(), s.holeLeft + (s.holeRight - s.holeLeft)/2, s.y + 13);
    }
}

function drawBall() {
    if (state === 'win') return;
    const x = Math.round(ballX);
    const y = Math.round(ballY);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + BALL_R - 1, BALL_R, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // Ball body
    ctx.fillStyle = GB.lightest;
    ctx.beginPath();
    ctx.arc(x, y, BALL_R, 0, Math.PI*2);
    ctx.fill();

    // Ball outline
    ctx.strokeStyle = GB.darkest;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, BALL_R, 0, Math.PI*2);
    ctx.stroke();

    // Dimple lines
    ctx.strokeStyle = GB.mid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, BALL_R - 2, Math.PI*0.2, Math.PI*0.8);
    ctx.stroke();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(x - 3, y - 5, 3, 2);
}

function drawArrow() {
    if (state !== 'idle') return;

    const s     = shelves[level];
    const arrowY = s.y - 14; // just above shelf
    const ax     = Math.round(arrowX);

    // Downward-pointing triangle arrow — no line
    const aw = 10, ah = 12;
    ctx.fillStyle = GB.darkest;
    ctx.beginPath();
    ctx.moveTo(ax,      arrowY);       // tip (bottom)
    ctx.lineTo(ax - aw, arrowY - ah);  // top-left
    ctx.lineTo(ax + aw, arrowY - ah);  // top-right
    ctx.closePath();
    ctx.fill();

    // Arrow outline
    ctx.strokeStyle = GB.mid;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Highlight hole zone with subtle glow
    ctx.fillStyle = 'rgba(139,172,15,0.2)';
    ctx.fillRect(s.holeLeft, s.y - 22, s.holeRight - s.holeLeft, 22);
}

function drawPutter() {
    // Only draw on active level
    const s    = shelves[level];
    const side = s.side;
    const groundY = s.y;
    const swing   = putterSwing === 1 && swingTimer < 25;

    // Base X centred on putter's foot position
    const baseX = side === 'left' ? 20 : W - 20;
    const facingRight = side === 'left';

    ctx.save();
    ctx.translate(baseX, groundY);
    if (!facingRight) ctx.scale(-1, 1); // flip for right-side putter

    drawAndyPutter(swing);

    ctx.restore();
}

function drawAndyPutter(swing) {
    // Detailed pixel-art Andy character
    // Drawn facing RIGHT. Origin = (0, 0) = ground level at feet centre.

    const D  = GB.darkest;   // #0f380f - dark
    const M  = GB.mid;       // #8bac0f - mid
    const L  = GB.lightest;  // #c4d89a - light (skin/shirt)
    const W2 = '#e8f4c0';    // near-white highlight

    // ─ Shoes ─
    ctx.fillStyle = D;
    ctx.fillRect(-8, -5,  7, 5);   // left shoe
    ctx.fillRect( 1, -5,  8, 5);   // right shoe
    // shoe toe highlight
    ctx.fillStyle = M;
    ctx.fillRect(-8, -5, 7, 1);
    ctx.fillRect( 1, -5, 8, 1);

    // ─ Trousers ─
    ctx.fillStyle = D;
    ctx.fillRect(-7, -20, 6, 16);  // left leg
    ctx.fillRect( 1, -20, 6, 16);  // right leg
    ctx.fillRect(-7, -22, 14, 4);  // hip/waist band
    // trouser crease
    ctx.fillStyle = M;
    ctx.fillRect(-5, -18, 2, 10);

    // ─ Belt ─
    ctx.fillStyle = '#0a2a0a';
    ctx.fillRect(-8, -23, 16, 3);
    ctx.fillStyle = M;
    ctx.fillRect(-1, -23, 3, 3);  // buckle

    // ─ Shirt / torso ─
    ctx.fillStyle = M;
    ctx.fillRect(-8, -38, 16, 16); // body
    // V-neck detail
    ctx.fillStyle = L;
    ctx.fillRect(-2, -38, 4, 5);
    ctx.fillStyle = D;
    ctx.fillRect(-1, -37, 2, 4);

    // Shirt pocket
    ctx.fillStyle = D;
    ctx.fillRect(-7, -35, 5, 4);
    ctx.fillStyle = M;
    ctx.fillRect(-6, -34, 3, 2);

    // Shirt collar
    ctx.fillStyle = L;
    ctx.fillRect(-4, -40, 8, 4);

    // ─ Arms ─
    if (!swing) {
        // Left arm holding club downward
        ctx.fillStyle = M;
        ctx.fillRect(-11, -36, 5, 18);  // left upper arm + forearm
        ctx.fillStyle = L;
        ctx.fillRect(-11, -26, 5, 8);   // forearm (skin)
        ctx.fillRect(-11, -19, 5, 5);   // hand
        // Right arm (rear)
        ctx.fillStyle = GB.dark;
        ctx.fillRect(6, -36, 5, 14);
        ctx.fillStyle = D;
        ctx.fillRect(6, -24, 5, 6);     // hand

        // ─ Club (standing ready) ─
        ctx.fillStyle = L;
        ctx.fillRect(-9, -19, 3, 3);    // hands on grip
        ctx.fillStyle = D;
        ctx.fillRect(-9, 0,  3, -18);   // shaft going down from grip (already at 0 = ground)
        // club head (flat rectangle at ground)
        ctx.fillStyle = GB.mid;
        ctx.fillRect(-14, -4, 10, 4);
        ctx.fillStyle = D;
        ctx.fillRect(-14, -4, 10, 1);

    } else {
        // Follow-through: arms swept forward/right
        ctx.fillStyle = M;
        ctx.fillRect(3, -40, 5, 14);    // raised right arm
        ctx.fillStyle = L;
        ctx.fillRect(6, -34, 5, 10);    // forearm
        ctx.fillRect(8, -26, 4, 6);     // hand
        // left arm follows
        ctx.fillStyle = M;
        ctx.fillRect(-2, -38, 5, 12);
        ctx.fillStyle = L;
        ctx.fillRect(0, -30, 5, 8);
        ctx.fillRect(2, -24, 4, 5);

        // Club swept through — shaft pointing low-right after putt
        ctx.fillStyle = D;
        ctx.fillRect(8, -24, 2, 20);
        ctx.fillStyle = GB.mid;
        ctx.fillRect(8, -8, 10, 4);
        ctx.fillStyle = D;
        ctx.fillRect(8, -8, 10, 1);
    }

    // ─ Head ─
    // Neck
    ctx.fillStyle = L;
    ctx.fillRect(-3, -44, 6, 5);

    // Head shape (slightly wider than tall, like the image)
    ctx.fillStyle = L;
    ctx.fillRect(-9, -58, 18, 16);

    // Ears
    ctx.fillRect(-11, -55, 3, 8);
    ctx.fillRect(8,   -55, 3, 8);
    ctx.fillStyle = D;
    ctx.fillRect(-10, -54, 1, 5);  // ear detail
    ctx.fillRect(9,   -54, 1, 5);

    // ─ Hair (dark, swept slightly) ─
    ctx.fillStyle = D;
    ctx.fillRect(-9, -58, 18, 5);   // top hair
    ctx.fillRect(-9, -58, 3, 12);   // side hair left
    ctx.fillRect(6,  -58, 3, 8);    // side hair right
    // Hair highlight
    ctx.fillStyle = GB.dark;
    ctx.fillRect(-5, -57, 6, 2);

    // ─ Face features ─
    // Eyebrows
    ctx.fillStyle = D;
    ctx.fillRect(-6, -51, 5, 2);
    ctx.fillRect( 1, -51, 5, 2);

    // Eyes (with white sclera)
    ctx.fillStyle = W2;
    ctx.fillRect(-6, -48, 5, 5);
    ctx.fillRect( 1, -48, 5, 5);
    ctx.fillStyle = D;
    ctx.fillRect(-5, -47, 3, 3);  // left pupil
    ctx.fillRect( 2, -47, 3, 3);  // right pupil
    // eye shine
    ctx.fillStyle = W2;
    ctx.fillRect(-5, -47, 1, 1);
    ctx.fillRect( 2, -47, 1, 1);

    // Nose
    ctx.fillStyle = GB.dark;
    ctx.fillRect(-1, -44, 2, 3);

    // Mouth (slight smile)
    ctx.fillStyle = D;
    ctx.fillRect(-4, -41, 8, 2);
    ctx.fillRect(-5, -42, 2, 1);
    ctx.fillRect( 3, -42, 2, 1);

    // Chin shadow
    ctx.fillStyle = GB.dark;
    ctx.fillRect(-7, -43, 14, 1);
}

function drawHUD() {
    // Top bar
    ctx.fillStyle = GB.darkest;
    ctx.fillRect(0, 0, W, HUD_H);

    ctx.fillStyle = GB.light;
    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('HOLE ' + (level + 1) + '/5', 8, 15);

    // Progress squares
    for (let i = 0; i < 5; i++) {
        ctx.fillStyle = i < level ? GB.mid : (i === level ? GB.light : GB.dark);
        ctx.fillRect(W - 14 - i * 14, 6, 10, 10);
    }
}

function drawOverlays() {
    if (state === 'miss' && flashTimer > 0) {
        const flash = Math.floor(flashTimer / 6) % 2 === 0;
        if (flash) {
            ctx.fillStyle = 'rgba(15,56,15,0.5)';
            ctx.fillRect(0, HUD_H, W, H - HUD_H - BTN_H);
        }
        ctx.font = '16px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillStyle = flash ? GB.lightest : GB.mid;
        ctx.fillText('MISS!', W/2, H/2 - 30);
    }

    if (state === 'gameover') {
        ctx.fillStyle = 'rgba(5,15,5,0.85)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = GB.lightest;
        ctx.font = '18px "Press Start 2P"';
        ctx.fillText('MISS!', W/2, H/2 - 50);
        ctx.font = '9px "Press Start 2P"';
        ctx.fillStyle = GB.mid;
        ctx.fillText('BALL OUT OF BOUNDS', W/2, H/2 - 20);
        ctx.fillStyle = Math.floor(Date.now()/400)%2 ? GB.light : GB.mid;
        ctx.font = '8px "Press Start 2P"';
        ctx.fillText('TAP TO TRY AGAIN', W/2, H/2 + 20);
    }

    if (state === 'win') {
        ctx.fillStyle = 'rgba(5,15,5,0.88)';
        ctx.fillRect(0, 0, W, H);
        ctx.textAlign = 'center';
        ctx.fillStyle = GB.light;
        ctx.font = '16px "Press Start 2P"';
        ctx.fillText('YOU WIN!', W/2, H/2 - 60);
        ctx.font = '8px "Press Start 2P"';
        ctx.fillStyle = GB.mid;
        ctx.fillText('ALL 5 HOLES DONE!', W/2, H/2 - 30);
        ctx.fillStyle = Math.floor(Date.now()/400)%2 ? GB.light : GB.mid;
        ctx.fillText('TAP TO PLAY AGAIN', W/2, H/2 + 20);
    }
}
</script>
</body>
</html>
