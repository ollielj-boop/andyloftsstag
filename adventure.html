<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Farmers Boy Inn - Andy's Stag Do</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        /* IBM PC style logo */
        .ibm-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .ibm-logo:hover {
            opacity: 0.7;
        }

        .ibm-logo-text {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            color: #808080;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            line-height: 1;
        }

        .ibm-logo-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background-color: #808080;
        }

        .ibm-logo-text span {
            position: relative;
            background-color: #000;
            padding: 0 3px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 80px;
        }

        /* Title - ASCII art */
        .game-title {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff00;
            font-size: 14px;
            line-height: 1.1;
        }

        .game-title pre {
            display: inline-block;
            font-family: 'Courier New', monospace;
            margin: 0;
            text-align: left;
        }

        /* Image area */
        .scene-image {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
            border: 3px solid #00ff00;
            position: relative;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: contrast(1.1) saturate(1.2);
        }

        /* Loading effect */
        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #00ff00;
            z-index: 10;
        }

        .loading.hidden {
            display: none;
        }

        /* Text area */
        .text-area {
            background-color: #000;
            border: 2px solid #00ff00;
            padding: 20px;
            min-height: 200px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 18px;
        }

        .text-content {
            white-space: pre-wrap;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-button {
            background-color: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 15px 25px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-button:hover {
            background-color: #00ff00;
            color: #000;
            transform: translateX(10px);
        }

        .option-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Cursor blink effect */
        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .ibm-logo {
                top: 10px;
                left: 10px;
            }

            .ibm-logo-text {
                font-size: 12px;
            }

            .container {
                padding-top: 60px;
            }

            .game-title {
                font-size: 8px;
            }

            .scene-image {
                height: 250px;
            }

            .text-area, .option-button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- IBM PC style logo -->
    <div class="ibm-logo" onclick="window.location.href='index.html'">
        <div class="ibm-logo-text">
            <div class="ibm-logo-line"></div>
            <span>ANDY LOFTS STAG DO</span>
        </div>
    </div>

    <div class="container">
        <h1 class="game-title">
            <pre>

 ║ ╠═╣║╣   ╠╣ ╠═╣╠╦╝║║║║╣ ╠╦╝╚═╗  ╠╩╗║ ║╚╦╝  ║║║║║║║
 ╩ ╩ ╩╚═╝  ╚  ╩ ╩╩╚═╩ ╩╚═╝╩╚═╚═╝  ╚═╝╚═╝ ╩   ╩╝╚╝╝╚╝</pre>
        </h1>
        
        <div class="scene-image">
            <div class="loading" id="loading">LOADING<span class="cursor">_</span></div>
            <img id="scene-img" src="" alt="Scene" style="display: none;">
        </div>

        <div class="text-area">
            <div class="text-content" id="text-content"></div>
        </div>

        <div class="options" id="options"></div>
    </div>

    <script src="game-data.js"></script>
    <script>
        let currentScene = 'Pub1';
        let isTyping = false;

        // Load scene
        function loadScene(sceneName) {
            if (isTyping) return;
            
            currentScene = sceneName;
            const scene = gameData[sceneName];
            
            if (!scene) {
                console.error('Scene not found:', sceneName);
                return;
            }

            // Clear options while typing
            document.getElementById('options').innerHTML = '';
            
            // Load image with loading effect
            const loading = document.getElementById('loading');
            const img = document.getElementById('scene-img');
            
            loading.classList.remove('hidden');
            img.style.display = 'none';
            
            // Simulate loading time for retro feel
            setTimeout(() => {
                // Try different extensions
                const extensions = ['', '.JPG', '.jpg', '.jpeg', '.JPEG', '.png', '.PNG'];
                let extensionIndex = 0;
                
                const tryLoadImage = () => {
                    if (extensionIndex < extensions.length) {
                        img.src = `images/${scene.image}${extensions[extensionIndex]}`;
                        extensionIndex++;
                    } else {
                        loading.innerHTML = 'IMAGE NOT FOUND: ' + scene.image;
                        img.style.display = 'none';
                    }
                };
                
                img.onload = () => {
                    loading.classList.add('hidden');
                    img.style.display = 'block';
                };
                
                img.onerror = tryLoadImage;
                
                tryLoadImage();
            }, 500);

            // Type out text
            typeText(scene.text, () => {
                // Show options after text is done
                showOptions(scene.options);
            });
        }

        // Typing effect
        function typeText(text, callback) {
            isTyping = true;
            const textElement = document.getElementById('text-content');
            textElement.textContent = '';
            
            let index = 0;
            const speed = 30; // milliseconds per character

            function type() {
                if (index < text.length) {
                    textElement.textContent += text[index];
                    index++;
                    setTimeout(type, speed);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }

            type();
        }

        // Show options
        function showOptions(options) {
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = `> ${option.text}`;
                button.style.opacity = '0';
                
                button.onclick = () => handleOption(option);

                optionsContainer.appendChild(button);

                // Fade in with delay
                setTimeout(() => {
                    button.style.transition = 'opacity 0.5s';
                    button.style.opacity = '1';
                }, index * 200);
            });
        }

        // Handle option selection
        function handleOption(option) {
            const lead = option.lead;

            // Check for special leads
            if (lead === 'Website Home Page') {
                window.location.href = 'index.html';
            } else if (lead === 'Golf Game page') {
                window.location.href = 'golf-game.html';
            } else if (lead && gameData[lead]) {
                loadScene(lead);
            } else {
                console.error('Invalid lead:', lead);
            }
        }

        // Start the game
        window.addEventListener('load', () => {
            loadScene('Pub1');
        });
    </script>
</body>
</html>
